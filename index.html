<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FLOA BK</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--p:#6A0DAD;--l:#F3E8FF;--bg:#f6f2ff;--w:#fff;--m:#6b7280;--b:#e5e7eb;--g:#166534}
*{box-sizing:border-box;font-family:system-ui,Arial,sans-serif;margin:0;padding:0}
body{background:linear-gradient(180deg,#f6f2ff 0%,#fff 60%);font-size:14px}
.screen{display:none;min-height:100vh;padding-bottom:85px}.screen.active{display:block}
.btn{width:100%;padding:14px;background:var(--p);color:#fff;border:0;border-radius:9px;font-size:16px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.5}
.input{width:100%;padding:12px;border:1px solid #D1D5DB;border-radius:8px;font-size:15px}
header{background:#fff;padding:14px 18px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px;font-weight:800;font-size:20px;color:var(--p)}
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--b)}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--p);display:grid;grid-template-columns:repeat(4,1fr);padding:10px 0 6px;z-index:40}
.nav{color:#fff;font-size:11px;opacity:.8;text-align:center}.nav i{font-size:18px}
.detail{margin-bottom:12px}.detail label{font-size:12px;color:var(--m);display:block}.detail b{display:block;font-size:15px;margin-top:2px}
</style>
</head>
<body>

<section id="login" class="screen active">
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px">
<div class="card" style="max-width:360px;width:100%">
<div style="width:70px;height:70px;background:var(--p);border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:24px">FB</div>
<h1 style="text-align:center;color:var(--p);margin-bottom:18px">FLOA BK</h1>
<input id="email" class="input" placeholder="Email" style="margin-bottom:10px">
<input id="pin" class="input" placeholder="PIN" type="password" maxlength="6" style="margin-bottom:14px">
<button class="btn" onclick="login()">Zaloguj się</button>
<p id="err" style="color:red;font-size:12px;margin-top:8px;display:none"></p>
</div></div>
</section>

<section id="dashboard" class="screen">
<header><i class="fa-solid fa-building-columns"></i> FLOA BK</header>
<main style="padding:18px">
<h2 id="greet" style="margin-bottom:12px">Witaj</h2>
<div class="card"><p style="color:var(--m);font-size:13px">Dostępne saldo</p><p id="bal" style="font-size:30px;font-weight:700">0 zł</p><button class="btn" style="margin-top:12px" onclick="show('transfer')">Wykonaj przelew</button></div>
<h3 style="margin:14px 0 8px">Historia</h3>
<div class="card" style="display:flex;justify-content:space-between"><div><p>Przelew otrzymany</p><p style="font-size:12px;color:var(--m)" id="hist-date"></p></div><p id="hist" style="color:var(--g);font-weight:600"></p></div>
</main>
</section>

<section id="transfer" class="screen">
<header><i class="fa-solid fa-building-columns"></i> FLOA BK</header>
<main style="padding:18px">
<h2 style="margin-bottom:14px">Wykonaj przelew</h2>
<div class="card">
<p style="text-align:right;margin-bottom:8px">Saldo: <b id="bal2"></b></p>
<label>Kwota</label><input id="a" class="input" oninput="check()">
<label>Beneficjent</label><input id="b" class="input" oninput="check()">
<label>IBAN</label><input id="c" class="input" oninput="check()">
<label>BIC</label><input id="d" class="input" oninput="check()">
<label>Bank</label><input id="e" class="input" oninput="check()">
<label>Powód</label><input id="f" class="input" oninput="check()">
<button id="cont" class="btn" disabled onclick="toVerify()" style="margin-top:12px">Kontynuuj</button>
</div>
</main>
</section>

<section id="verify" class="screen">
<header><i class="fa-solid fa-building-columns"></i> FLOA BK</header>
<main style="padding:18px">
<h2 style="margin-bottom:6px">Weryfikacja tożsamości</h2>
<div class="card">
<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;color:var(--p);font-weight:600"><i class="fa-regular fa-file-lines"></i> Szczegóły oczekującego przelewu</div>
<div style="background:#fafafa;padding:14px;border-radius:8px">
<div class="detail"><label>Kwota przelewu:</label><b id="v1"></b></div>
<div class="detail"><label>Imię i nazwisko beneficjenta:</label><b id="v2"></b></div>
<div class="detail"><label>IBAN / Numer konta:</label><b id="v3"></b></div>
<div class="detail"><label>Kod Banque (BIC / SWIFT):</label><b id="v4"></b></div>
<div class="detail"><label>Nazwa banku:</label><b id="v5"></b></div>
<div class="detail"><label>Powód transferu:</label><b id="v6"></b></div>
<button style="margin-top:8px;padding:6px 10px;border:1px solid #fca5a5;color:#dc2626;background:#fff;border-radius:6px;font-size:12px" onclick="show('transfer')">Anuluj transfer →</button>
</div>
</div>

<div class="card">
<p style="margin-bottom:8px"><i class="fa-solid fa-lock"></i> Proszę wprowadzić kod aktywacyjny transferu.</p>
<label>Kod aktywacyjny</label>
<input id="code" class="input" placeholder="********" style="margin:6px 0 12px">
<button class="btn" onclick="finish()">Kontynuuj →</button>
<div id="prog" style="display:none;margin-top:12px"><div style="background:#eee;height:8px;border-radius:4px"><div id="bar" style="height:8px;background:var(--p);width:0%"></div></div><p id="ptxt" style="font-size:12px;margin-top:4px"></p></div>
</div>
</main>
</section>

<nav><div class="nav" onclick="show('dashboard')"><i class="fa-solid fa-house"></i><br>Portfel</div><div class="nav" onclick="show('transfer')"><i class="fa-solid fa-qrcode"></i><br>Zapłata</div><div class="nav"><i class="fa-regular fa-credit-card"></i><br>Karta</div><div class="nav"><i class="fa-regular fa-user"></i><br>Konto</div></nav>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import {getDatabase,ref,get} from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";
const cfg={apiKey:"AIzaSyCU-KBtj7vx3OouofytlwIN3KPd1McNLEk",authDomain:"vantex-admin-2026.firebaseapp.com",databaseURL:"https://vantex-admin-2026-default-rtdb.europe-west1.firebasedatabase.app",projectId:"vantex-admin-2026",storageBucket:"vantex-admin-2026.firebasestorage.app",messagingSenderId:"810884502320",appId:"1:810884502320:web:b5ba7c2909ddf4ccf02ef5"};
const app=initializeApp(cfg);const db=getDatabase(app);let user=null;
const $=id=>document.getElementById(id);const fmt=n=>new Intl.NumberFormat('pl-PL').format(Number(n)||0)+' zł';
window.show=id=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')};
window.login=async()=>{const e=$('email').value.toLowerCase().trim(),p=$('pin').value.trim();const s=await get(ref(db,'clients'));let f=null;for(const k in s.val()||{}){const v=s.val()[k];if(v.email?.toLowerCase()===e&&String(v.pin)===p){f={...v};break}}if(!f){$('err').textContent='Accès refusé';$('err').style.display='block';return}user=f;$('greet').textContent='Witaj, '+user.nom;$('bal').textContent=fmt(user.montant);$('bal2').textContent=fmt(user.montant);$('hist').textContent='+ '+fmt(user.montant);$('hist-date').textContent=new Date().toLocaleDateString('pl-PL');show('dashboard')};
window.check=()=>{$('cont').disabled=!['a','b','c','d','e','f'].every(i=>$(i).value.trim())};
window.toVerify=()=>{$('v1').textContent=Number($('a').value).toLocaleString('pl-PL',{minimumFractionDigits:2})+' zł';$('v2').textContent=$('b').value;$('v3').textContent=$('c').value;$('v4').textContent=$('d').value;$('v5').textContent=$('e').value;$('v6').textContent=$('f').value;show('verify')};
window.finish=()=>{if($('code').value.trim()!==user.code){alert('Kod błędny');return}const pct=Number(user.pct)||100;const pr=$('prog'),b=$('bar'),t=$('ptxt');pr.style.display='block';let w=0;const i=setInterval(()=>{w+=2;const c=Math.min(w,pct);b.style.width=c+'%';t.textContent=c+'%';if(w>=pct){clearInterval(i);t.textContent=pct<100?'Arrêté à '+pct+'%':user.msg||'OK';setTimeout(()=>show('dashboard'),1200)}},30)};
</script>
</body>
</html>
