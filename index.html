<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FLOA BK</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--p:#5e17eb;--bg:#f6f7fb;--w:#fff;--m:#6b7280;--b:#e5e7eb}
*{box-sizing:border-box;font-family:Inter,system-ui,Arial,sans-serif}
body{margin:0;background:var(--bg)}
.screen{display:none;min-height:100vh;padding-bottom:80px}.screen.active{display:block}
.btn{width:100%;padding:16px;background:var(--p);color:#fff;border:0;border-radius:12px;font-size:16px;font-weight:600}
.btn:disabled{opacity:.5}
.input{width:100%;padding:14px;border:1px solid #d1d5db;border-radius:10px;font-size:15px}
header{background:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f0f0}
.logo{font-weight:800;font-size:22px;color:var(--p);display:flex;align-items:center;gap:8px}
.card{background:#fff;border-radius:16px;padding:18px;margin:12px 16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--p);display:grid;grid-template-columns:repeat(4,1fr);padding:10px 0;color:#fff}
.nav{text-align:center;font-size:11px}.nav i{display:block;font-size:20px;margin-bottom:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<section id="login" class="screen active">
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px">
<div style="width:100%;max-width:380px">
<div style="width:80px;height:80px;background:var(--p);border-radius:50%;margin:0 auto -40px;position:relative;z-index:2;display:flex;align-items:center;justify-content:center;color:#fff;font-size:42px;font-weight:800">F</div>
<div class="card" style="padding-top:50px">
<h1 style="text-align:center;margin:0 0 16px">FLOA BK - Twoja strefa klienta</h1>
<div id="welcome" style="background:#f3f4f6;padding:12px;border-radius:12px;text-align:center;font-size:14px;margin-bottom:18px">Ładowanie...</div>
<label>Twój adres e-mail</label>
<input id="email" class="input" style="margin:6px 0 14px;background:#eef2ff" readonly>
<label>Twój kod PIN</label>
<input id="pin" class="input" type="password" maxlength="6" style="margin:6px 0 18px;border:2px solid #a78bfa">
<button class="btn" onclick="login()">Zaloguj się →</button>
<p id="err" style="color:#dc2626;text-align:center;margin-top:8px;display:none">Błąd</p>
</div></div></div>
</section>

<!-- DASHBOARD -->
<section id="dash" class="screen">
<header><div class="logo"><i class="fa-solid fa-building-columns"></i> FLOA BK</div><div id="avatar" style="width:36px;height:36px;border-radius:50%;background:#c7f0e4;display:flex;align-items:center;justify-content:center;font-weight:700">FB</div></header>
<div style="padding:16px">
<p id="greet" style="font-size:18px;margin-bottom:12px"></p>
<div class="card">
<div>Dostępne saldo <i class="fa-solid fa-circle-check" style="color:var(--p)"></i></div>
<div id="bal" style="font-size:32px;font-weight:700;margin:8px 0">0 zł</div>
<button class="btn" style="margin-top:10px;background:#f3f4f6;color:#111" onclick="show('transfer')">Wykonaj przelew</button>
</div>
</div>
</section>

<!-- TRANSFER -->
<section id="transfer" class="screen">
<header><div class="logo"><i class="fa-solid fa-building-columns"></i> FLOA BK</div></header>
<div style="padding:16px">
<div class="card">
<label>Kwota</label><input id="a" class="input" oninput="check()">
<label>Beneficjent</label><input id="b" class="input" oninput="check()">
<label>IBAN</label><input id="c" class="input" oninput="check()">
<label>BIC</label><input id="d" class="input" oninput="check()">
<label>Bank</label><input id="e" class="input" oninput="check()">
<label>Powód</label><input id="f" class="input" oninput="check()">
<button id="cont" class="btn" disabled onclick="toVerify()" style="margin-top:12px">Kontynuuj →</button>
</div></div>
</section>

<!-- VERIFY -->
<section id="verify" class="screen">
<header><div class="logo"><i class="fa-solid fa-building-columns"></i> FLOA BK</div></header>
<div style="padding:16px">
<div class="card">
<h3>Szczegóły przelewu</h3>
<p>Kwota: <b id="v1"></b></p>
<p>Beneficjent: <b id="v2"></b></p>
<p>IBAN: <b id="v3"></b></p>
<p>BIC: <b id="v4"></b></p>
<p>Bank: <b id="v5"></b></p>
<p>Powód: <b id="v6"></b></p>
</div>
<div class="card">
<label>Kod aktywacyjny</label>
<input id="code" class="input" type="password" style="margin:8px 0">
<button class="btn" onclick="finish()">Potwierdź</button>
<div id="prog" style="display:none;margin-top:10px"><div style="background:#eee;height:8px;border-radius:4px"><div id="bar" style="height:8px;background:var(--p);width:0%"></div></div><p id="ptxt" style="font-size:12px"></p></div>
</div></div>
</section>

<nav><div class="nav" onclick="show('dash')"><i class="fa-solid fa-house"></i>Portfel</div><div class="nav" onclick="show('transfer')"><i class="fa-solid fa-paper-plane"></i>Zapłata</div><div class="nav"><i class="fa-regular fa-credit-card"></i>Karta</div><div class="nav"><i class="fa-regular fa-user"></i>Konto</div></nav>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import {getDatabase,ref,get} from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";
const cfg={apiKey:"AIzaSyCU-KBtj7vx3OouofytlwIN3KPd1McNLEk",authDomain:"vantex-admin-2026.firebaseapp.com",databaseURL:"https://vantex-admin-2026-default-rtdb.europe-west1.firebasedatabase.app",projectId:"vantex-admin-2026",storageBucket:"vantex-admin-2026.firebasestorage.app",messagingSenderId:"810884502320",appId:"1:810884502320:web:b5ba7c2909ddf4ccf02ef5"};
const app=initializeApp(cfg);const db=getDatabase(app);let user=null;
const $=id=>document.getElementById(id);
const show=id=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')};
const fmt=n=>new Intl.NumberFormat('pl-PL',{minimumFractionDigits:2}).format(n);

// CHARGE LE COMPTE ADMIN AU DÉMARRAGE
get(ref(db,'clients')).then(snap=>{
  const data=Object.values(snap.val()||{})[0];
  if(data){
    user=data;
    $('welcome').innerHTML=`<b>${data.nom}</b>, Zarejestruj swoje konto, aby się zalogować`;
    $('email').value=data.email;
    $('pin').value=data.pin;
  }
});

window.login=async()=>{
  const e=$('email').value.trim().toLowerCase();
  const p=$('pin').value.trim();
  const snap=await get(ref(db,'clients'));
  let found=null;
  for(const k in snap.val()||{}){const v=snap.val()[k];if(v.email.toLowerCase()===e&&v.pin===p){found=v;break}}
  if(!found){$('err').style.display='block';return}
  user=found;
  $('greet').textContent='Powitanie, '+user.nom;
  $('bal').textContent=fmt(user.montant)+' zł';
  $('avatar').textContent=user.nom.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  show('dash');
};
window.check=()=>{$('cont').disabled=!['a','b','c','d','e','f'].every(i=>$(i).value.trim())};
window.toVerify=()=>{['v1','v2','v3','v4','v5','v6'].forEach((id,i)=>$(id).textContent=$(['a','b','c','d','e','f'][i]).value);$('v1').textContent=fmt($('a').value)+' zł';show('verify')};
window.finish=()=>{if($('code').value!==user.code){alert('Zły kod');return}const pct=user.pct||100;let w=0;$('prog').style.display='block';const iv=setInterval(()=>{w+=5;if(w>pct)w=pct;$('bar').style.width=w+'%';$('ptxt').textContent=w+'%';if(w>=pct){clearInterval(iv);$('ptxt').textContent=user.msg||'OK'}},200)};
</script>
</body>
</html>
